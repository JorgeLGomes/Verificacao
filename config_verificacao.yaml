# =====================================================================
# Configuracao unificada da verificacao do modelo Eta
#   - precipitacao acumulada 24h  -> referencia MERGE
#   - campos continuos instantaneos (T2m, PNMM, vento 10m, [Z500]) -> ERA5
# Edite os caminhos e, se preciso, os nomes de variaveis (use verifica.py de
# cada componente com --max-rodadas 1 para um teste rapido).
# =====================================================================

base: /lustre/projetos/grpeta/Team/jorge.gomes/convert2nc   # raiz com nc/, nc_oper/, nc_merge/ (precip NetCDF)
# raiz do Eta em binctl (GrADS) para os campos continuos: <binctl_base>/<AAAAMMDDHH>/<member>/<ctl>
binctl_base: /lustre/projetos/grpeta/Team/jorge.gomes/Eta_install/out/ams_08km/binctl
saida: resultados_uni
regrid: linear                # linear (bilinear) ou nearest
init_glob: "*"                # filtra rodadas (ex.: "202601*")

# janelas de 24h para precipitacao (horas finais: 12=12Z-12Z, 0=00Z-00Z)
janelas_precip: [12, 0]
# prazos (horas) para os campos instantaneos vs ERA5 (D+1..D+11 = horizonte 264h)
leads_horas: [24, 48, 72, 96, 120, 144, 168, 192, 216, 240, 264]

# meses a verificar em TODAS as metricas (curvas + mapas): so meses completos
# Jan/Fev/Mar. Vazio ([]) ou remova para usar todo o periodo dos dados.
meses: [1, 2, 3]

# mapas espaciais: media diaria por dia de previsao (prazo), separada por mes
# (colunas Todo periodo / Jan / Fev / Mar ...). Cuidado com memoria/tamanho do
# binario em grades grandes: restrinja 'leads' se necessario.
mapas:
  ativar: true
  leads: null        # null = todos os prazos; ou lista, ex.: [1, 3, 5, 7]
  por_mes: true      # true = separa por mes + Todo; false = so Todo periodo
  meses: [1, 2, 3]   # so meses completos (Jan/Fev/Mar); descarta Abr parcial
  bordas: true       # fronteiras de paises + estados do Brasil (cartopy)

regioes:
  # caixas das 4 regioes do relatorio (aproximadas; ajuste se tiver as oficiais)
  caixas_br:
    Amazonia: [-7.0, -1.0, -68.0, -58.0]
    Nordeste: [-12.0, -5.0, -42.0, -35.0]
    Sudeste:  [-24.0, -18.0, -48.0, -40.0]
    Sul:      [-32.0, -26.0, -57.0, -49.0]

# modelos comparados (comum a todos os componentes)
modelos:
  jaci: {subdir: nc,      reader: netcdf}
  xc50: {subdir: nc_oper, reader: netcdf}

# fontes de referencia
referencias:
  merge:
    reader: netcdf
    subdir: nc_merge
    padrao: "MERGE_*.nc"
  era5:
    reader: netcdf
    arquivo: /lustre/projetos/grpeta/Team/jorge.gomes/ERA5/data_stream-oper_stepType-instant.nc

# Modelo Eta em binctl (E03) para os campos continuos. Cada componente declara
# o modelo com: reader: binctl, member: E03, ctl: "Eta08_E03_{init}.ctl" e a
# variavel/unidade especifica. Ajuste 'member'/'ctl' se o seu layout diferir.

# =====================================================================
# COMPONENTES (o que verificar)
# =====================================================================
componentes:

  precipitacao:
    tipo: acum24
    referencia: merge
    unidade: mm
    metricas: [continuas, categoricas, fss]
    limiares: [0.254, 2.54, 6.35, 12.7, 19.05, 25.4, 38.1, 50.0]
    escalas_fss: [1, 3, 5, 11]
    modelos:
      jaci: {padrao: "PREC-ACUM24h_*.nc", var: null, fator_para_mm: 1000.0, acumulado: true}
      xc50: {padrao: "PREC_*.nc",         var: null, fator_para_mm: 1.0,    acumulado: false}

  t2m:
    tipo: instantaneo
    referencia: era5
    unidade: C
    metricas: [continuas]
    era5: {var: t2m, unidade: K}
    modelos:
      jaci: {subdir: nc,      reader: netcdf, padrao: "tp2m_*.nc", var: null, unidade: K}
      xc50: {subdir: nc_oper, reader: netcdf, padrao: "tp2m_*.nc", var: null, unidade: K}

  pnmm:
    tipo: instantaneo
    referencia: era5
    unidade: hPa
    metricas: [continuas]
    era5: {var: msl, unidade: Pa}
    modelos:
      # ATENCAO: pslm do jaci (Eta) costuma vir em hPa; do xc50 (grib2 prmsl) em Pa.
      jaci: {subdir: nc,      reader: netcdf, padrao: "pslm_*.nc", var: null, unidade: hPa}
      xc50: {subdir: nc_oper, reader: netcdf, padrao: "pslm_*.nc", var: null, unidade: Pa}

  u10:
    tipo: instantaneo
    referencia: era5
    unidade: m/s
    metricas: [continuas]
    era5: {var: u10, unidade: m/s}
    modelos:
      jaci: {subdir: nc,      reader: netcdf, padrao: "u10m_*.nc", var: null, unidade: m/s}
      xc50: {subdir: nc_oper, reader: netcdf, padrao: "u10m_*.nc", var: null, unidade: m/s}

  v10:
    tipo: instantaneo
    referencia: era5
    unidade: m/s
    metricas: [continuas]
    era5: {var: v10, unidade: m/s}
    modelos:
      jaci: {subdir: nc,      reader: netcdf, padrao: "v10m_*.nc", var: null, unidade: m/s}
      xc50: {subdir: nc_oper, reader: netcdf, padrao: "v10m_*.nc", var: null, unidade: m/s}

  # magnitude do vento a 10 m = sqrt(u^2 + v^2) (derivada de u e v)
  wspd10:
    tipo: instantaneo
    referencia: era5
    unidade: m/s
    metricas: [continuas]
    derivada: magnitude
    era5: {u: u10, v: v10, unidade: m/s}
    modelos:
      jaci:
        subdir: nc
        reader: netcdf
        unidade: m/s
        u: {padrao: "u10m_*.nc", var: null}
        v: {padrao: "v10m_*.nc", var: null}
      xc50:
        subdir: nc_oper
        reader: netcdf
        unidade: m/s
        u: {padrao: "u10m_*.nc", var: null}
        v: {padrao: "v10m_*.nc", var: null}

  # ----- geopotencial em 500 hPa: preparado, ATIVE quando tiver os dados -----
  # Requer ERA5 em niveis de pressao (variavel z, nivel 500) e o campo 3D do
  # modelo (ZGEO). Para binctl use um .ctl/.bin ja no nivel 500, ou o NetCDF 3D
  # com a variavel e o nivel selecionavel (spec.nivel).
  # z500:
  #   tipo: instantaneo
  #   referencia: era5
  #   unidade: m
  #   metricas: [continuas]
  #   era5: {var: z, nivel: 500, unidade: m}     # se z vier como geopotencial (m2/s2), converta /9.80665
  #   modelos:
  #     jaci: {subdir: nc,      reader: netcdf, padrao: "ZGEO_*.nc", var: zgeo, nivel: 500, unidade: m}
  #     xc50: {subdir: nc_oper, reader: netcdf, padrao: "ZGEO_*.nc", var: zgeo, nivel: 500, unidade: m}
